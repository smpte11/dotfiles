theme = "active-theme"
diff_view = "side-by-side"
ignore_whitespace = false
show_file_list = true
mouse = false
leader = ";"
wrap = false
cursor_line = true
transparent_background = false
scroll_offset = 5
review_watch_interval_ms = 1000

comment_types = [
  { id = "note", definition = "ask for clarification" },
  { id = "suggestion", definition = "possible improvement" },
  { id = "issue", definition = "must fix before merge" },
  { id = "praise", definition = "nice work" },
]

[forge]
comment_type_prefix = true
